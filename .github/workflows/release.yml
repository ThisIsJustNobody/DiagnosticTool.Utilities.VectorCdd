name: Release NuGet Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-test-pack-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/VectorCdd.sln

      - name: Build (Release)
        run: dotnet build src/VectorCdd.sln -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test src/VectorCdd.Tests/VectorCdd.Tests.csproj -c Release --no-build --filter "TestCategory!=Integration"

      - name: Pack
        run: dotnet pack src/VectorCdd/VectorCdd.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs

      - name: Push to nuget.org
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkgs/*.nupkg
          generate_release_notes: true
